sources:
  npm: true

# Force UTF-8 encoding
encoding: 'utf-8'

# Ignore problematic packages with encoding issues
ignored:
  npm:
    - form-data
    - "@angular-eslint/template-parser" # optional peer dep of eslint-plugin-import, not installed
    - "@arethetypeswrong/cli" # optional peer dep, not installed

allowed:
  - apache-2.0
  - bsd-2-clause
  - bsd-3-clause
  - isc
  - mit
  - cc0-1.0
  - unlicense
  - 0bsd

reviewed:
  npm:
  - sax
  - "@protobuf-ts/plugin-framework" # Apache-2.0
  - "@protobuf-ts/runtime" # Apache-2.0
  - fs.realpath # ISC
  - glob # ISC
  - prettier # MIT
  - lodash # MIT
  - "@actions/http-client" # MIT
  - "@actions/glob" # MIT
  - ieee754 # BSD-3-Clause (license file format not auto-detected)
  - readable-stream # MIT (license file format not auto-detected)
  - string_decoder # MIT (license file format not auto-detected)
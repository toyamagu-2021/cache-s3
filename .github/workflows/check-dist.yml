name: Check dist content

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-dist:
    name: Check dist/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild dist/
        run: pnpm build

      - name: Fail if dist/ differs from committed
        id: diff
        run: |
          if [ "$(git diff --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes in dist/ after build:"
            git diff dist/
            exit 1
          fi

      - name: Upload expected dist/ as artifact
        if: failure() && steps.diff.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

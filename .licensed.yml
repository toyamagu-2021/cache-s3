sources:
  npm: true

# Force UTF-8 encoding
encoding: 'utf-8'

# Ignore problematic packages with encoding issues
ignored:
  npm:
    - form-data
    - "@angular-eslint/template-parser" # optional peer dep of eslint-plugin-import, not installed
    - "@arethetypeswrong/cli" # optional peer dep, not installed

allowed:
  - apache-2.0
  - bsd-2-clause
  - bsd-3-clause
  - isc
  - mit
  - cc0-1.0
  - unlicense
  - 0bsd

reviewed:
  npm:
  - sax
  - "@protobuf-ts/plugin-framework" # Apache-2.0
  - "@protobuf-ts/runtime" # Apache-2.0
  - fs.realpath # ISC
  - glob # ISC
  - prettier # MIT
  - lodash # MIT
  - "@actions/http-client" # MIT
  - "@actions/glob" # MIT
  # AWS SDK packages (Apache-2.0)
  - "@aws-sdk/checksums"
  - "@aws-sdk/client-s3"
  - "@aws-sdk/core"
  - "@aws-sdk/credential-provider-env"
  - "@aws-sdk/credential-provider-http"
  - "@aws-sdk/credential-provider-ini"
  - "@aws-sdk/credential-provider-login"
  - "@aws-sdk/credential-provider-node"
  - "@aws-sdk/credential-provider-process"
  - "@aws-sdk/credential-provider-sso"
  - "@aws-sdk/credential-provider-web-identity"
  - "@aws-sdk/lib-storage"
  - "@aws-sdk/middleware-flexible-checksums"
  - "@aws-sdk/middleware-sdk-s3"
  - "@aws-sdk/nested-clients"
  - "@aws-sdk/signature-v4-multi-region"
  - "@aws-sdk/token-providers"
  - "@aws-sdk/types"
  - "@aws-sdk/util-locate-window"
  - "@aws-sdk/xml-builder"
  - "@aws-crypto/crc32"
  - "@aws-crypto/crc32c"
  - "@aws-crypto/sha1-browser"
  - "@aws-crypto/sha256-browser"
  - "@aws-crypto/sha256-js"
  - "@aws-crypto/supports-web-crypto"
  - "@aws-crypto/util"
  - "@smithy/core"
  - "@smithy/credential-provider-imds"
  - "@smithy/fetch-http-handler"
  - "@smithy/is-array-buffer"
  - "@smithy/node-http-handler"
  - "@smithy/signature-v4"
  - "@smithy/types"
  - "@smithy/util-buffer-from"
  - "@smithy/util-utf8"
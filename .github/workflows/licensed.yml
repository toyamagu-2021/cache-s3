name: License check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-cached-dependency-records:
    runs-on: ubuntu-latest
    name: Check licenses
    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - name: Install production dependencies only
        run: npm install --omit=dev --omit=optional --ignore-scripts

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1.7'

      - name: Install licensed tool
        run: |
          cd "$RUNNER_TEMP"
          curl -Lfs -o licensed.tar.gz https://github.com/licensee/licensed/archive/refs/tags/v5.0.4.tar.gz
          tar -xzf licensed.tar.gz
          cd licensed-5.0.4
          bundle install

      - name: Update cached dependency records
        run: |
          cd ${{ github.workspace }}
          BUNDLE_GEMFILE=$RUNNER_TEMP/licensed-5.0.4/Gemfile bundle exec $RUNNER_TEMP/licensed-5.0.4/exe/licensed cache

      - name: Check cached dependency records
        run: |
          cd ${{ github.workspace }}
          BUNDLE_GEMFILE=$RUNNER_TEMP/licensed-5.0.4/Gemfile bundle exec $RUNNER_TEMP/licensed-5.0.4/exe/licensed status